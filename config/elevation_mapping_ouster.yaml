# Remplacer point_cloud_topic par ceci :
input_sources:
  ouster_lidar:
    type: pointcloud
    topic: /ouster/points
    queue_size: 10
    publish_on_update: true
    sensor_processor:
      type: structured_light
      cutoff_min_depth: 0.2
      cutoff_max_depth: 5.0
      normal_variance_a: 0.00005
      normal_variance_b: 0.00005
      normal_variance_c: 0.00005
      normal_variance_d: 0.00005

map_frame_id: "world"              # Modifié (voir point 2)
robot_base_frame_id: "base"
robot_pose_with_covariance_topic: ""
robot_pose_cache_size: 200

track_point_frame_id: "base"
track_point_x: 0.0
track_point_y: 0.0
track_point_z: 0.0
min_update_rate: 10.0
time_tolerance: 0.2

length_in_x: 3.0
length_in_y: 3.0
resolution: 0.1
min_variance: 0.0001
max_variance: 0.05
mahalanobis_distance_threshold: 2.5
multi_height_noise: 0.0000009
